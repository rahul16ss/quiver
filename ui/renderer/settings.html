<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiver — Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <h1>Settings</h1>
      <div class="subtitle">Configuration is saved to .env and persists across CLI and GUI.</div>

      <div class="form-group">
        <label>LLM Endpoint</label>
        <input id="baseUrl" placeholder="https://ollama.com/v1">
      </div>

      <div class="form-group">
        <label>Model Name</label>
        <input id="modelName" placeholder="model name">
      </div>

      <div class="form-group">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="API key">
      </div>

      <div class="form-group">
        <label>Parallel API Key</label>
        <input id="parallelApiKey" type="password" placeholder="web search, research, entity search">
      </div>

      <div class="form-group">
        <label>Ollama Pro Key</label>
        <input id="ollamaApiKey" type="password" placeholder="Ollama web search & scrape">
      </div>

      <div class="form-group">
        <label>GitHub Token</label>
        <input id="githubToken" type="password" placeholder="ghp_...">
      </div>

      <div class="form-group">
        <label>Context7 API Key (optional)</label>
        <input id="context7ApiKey" type="password" placeholder="library docs search">
        <div class="hint">Works without a key — free tier</div>
      </div>

      <div class="form-group">
        <label>Browser Headless</label>
        <select id="browserHeadless">
          <option value="true">Yes (headless)</option>
          <option value="false">No (visible window)</option>
        </select>
        <div class="hint">Show browser for manual sign-in or debugging</div>
      </div>

      <div class="form-group">
        <label>Max Context Tokens</label>
        <input id="maxContextTokens" type="number" value="120000">
      </div>

      <div class="form-group">
        <label>Approval Required For</label>
        <input id="requireApprovalFor" placeholder="run_command,write_file,replace_content,browser_control,create_tool">
        <div class="hint">Comma-separated tool names. Empty = no approval prompts.</div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="saveSettings()">Save</button>
        <button class="btn-secondary" onclick="window.quiver.loadMain()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    async function loadSettings() {
      const config = await window.quiver.loadConfig();
      document.getElementById("baseUrl").value = config.provider.baseUrl || "";
      document.getElementById("modelName").value = config.provider.modelName || "";
      document.getElementById("apiKey").value = config.provider.apiKey || "";
      document.getElementById("parallelApiKey").value = config.parallelApiKey || "";
      document.getElementById("ollamaApiKey").value = config.ollamaApiKey || "";
      document.getElementById("githubToken").value = config.githubToken || "";
      document.getElementById("context7ApiKey").value = config.context7ApiKey || "";
      document.getElementById("browserHeadless").value = config.browserHeadless ? "true" : "false";
      document.getElementById("maxContextTokens").value = config.maxContextTokens || 120000;
      document.getElementById("requireApprovalFor").value = (config.requireApprovalFor || []).join(",");
    }

    async function saveSettings() {
      const config = {
        provider: {
          baseUrl: document.getElementById("baseUrl").value.trim(),
          modelName: document.getElementById("modelName").value.trim(),
          apiKey: document.getElementById("apiKey").value.trim(),
        },
        parallelApiKey: document.getElementById("parallelApiKey").value.trim(),
        ollamaApiKey: document.getElementById("ollamaApiKey").value.trim(),
        githubToken: document.getElementById("githubToken").value.trim(),
        context7ApiKey: document.getElementById("context7ApiKey").value.trim(),
        browserHeadless: document.getElementById("browserHeadless").value === "true",
        requireApprovalFor: document.getElementById("requireApprovalFor").value
          .split(",").map(s => s.trim()).filter(Boolean),
        maxContextTokens: parseInt(document.getElementById("maxContextTokens").value) || 120000,
        memoryDir: "./memory",
        skillsDir: "./skills",
      };

      await window.quiver.saveConfig(config);
      await window.quiver.loadMain();
    }

    loadSettings();
  </script>
</body>
</html>
