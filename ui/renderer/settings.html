<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiver — Settings</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <img src="assets/logo.png" class="form-logo" alt="Quiver">
      <h1>Settings</h1>
      <p class="subtitle">Configure your Quiver instance</p>

      <div class="form-group">
        <label>Workspace</label>
        <div class="dir-picker-row">
          <input id="workspacePath" type="text" placeholder="Workspace folder" readonly>
          <button class="btn-browse" onclick="browseWorkspace()">Browse</button>
        </div>
      </div>

      <div class="form-group">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="Ollama API key">
      </div>

      <div class="form-group">
        <label>Parallel API Key <span style="font-weight:400;text-transform:none;color:var(--text-faint);">(optional)</span></label>
        <input id="parallelApiKey" type="password" placeholder="For web search & deep research">
      </div>

      <div class="form-group">
        <label>Browser Mode</label>
        <select id="browserHeadless">
          <option value="true">Headless (recommended)</option>
          <option value="false">Visible window</option>
        </select>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="saveSettings()">Save</button>
        <button class="btn-secondary" onclick="window.quiver.loadMain()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let currentConfig = null;

    async function loadSettings() {
      currentConfig = await window.quiver.loadConfig();
      document.getElementById("workspacePath").value = currentConfig.workspacePath || "";
      document.getElementById("apiKey").value = currentConfig.provider?.apiKey || "";
      document.getElementById("parallelApiKey").value = currentConfig.parallelApiKey || "";
      document.getElementById("browserHeadless").value = currentConfig.browserHeadless ? "true" : "false";
    }

    async function browseWorkspace() {
      const selected = await window.quiver.selectWorkspaceDir();
      if (selected) document.getElementById("workspacePath").value = selected;
    }

    async function saveSettings() {
      // currentConfig is always fully defaulted by the main process
      // (loadConfig merges src/config.ts defaults), so no hardcoded fallbacks.
      await window.quiver.saveConfig({
        ...currentConfig,
        workspacePath: document.getElementById("workspacePath").value.trim(),
        provider: {
          ...currentConfig?.provider,
          apiKey: document.getElementById("apiKey").value.trim(),
        },
        parallelApiKey: document.getElementById("parallelApiKey").value.trim(),
        ollamaApiKey: document.getElementById("apiKey").value.trim(),
        browserHeadless: document.getElementById("browserHeadless").value === "true",
      });
      await window.quiver.loadMain();
    }

    loadSettings();
  </script>
</body>
</html>
