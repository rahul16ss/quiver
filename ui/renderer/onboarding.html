<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiver — Setup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <h1>⚡ Quiver</h1>
      <div class="subtitle">Self-evolving AI coding & research agent</div>

      <div class="form-group">
        <label>LLM Endpoint</label>
        <input id="baseUrl" value="https://ollama.com/v1" placeholder="https://ollama.com/v1">
        <div class="hint">Any OpenAI-compatible endpoint</div>
      </div>

      <div class="form-group">
        <label>Model Name</label>
        <input id="modelName" value="glm-5.2:cloud" placeholder="model name">
        <div class="hint">e.g. glm-5.2:cloud, gpt-4o, deepseek-v3</div>
      </div>

      <div class="form-group">
        <label>API Key</label>
        <input id="apiKey" type="password" placeholder="your API key">
        <div class="hint">Get one at ollama.com or your LLM provider</div>
      </div>

      <div class="form-group">
        <label>Parallel API Key (optional)</label>
        <input id="parallelApiKey" type="password" placeholder="for web search, research, entity search">
        <div class="hint">Powers web_search, deep_research, find_all, scrape_url</div>
      </div>

      <div class="form-group">
        <label>GitHub Token (optional)</label>
        <input id="githubToken" type="password" placeholder="ghp_...">
        <div class="hint">For GitHub issues, PRs, file operations</div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="saveAndStart()">Start Quiver</button>
      </div>
    </div>
  </div>

  <script>
    async function saveAndStart() {
      const config = {
        provider: {
          baseUrl: document.getElementById("baseUrl").value.trim(),
          modelName: document.getElementById("modelName").value.trim(),
          apiKey: document.getElementById("apiKey").value.trim(),
        },
        parallelApiKey: document.getElementById("parallelApiKey").value.trim(),
        ollamaApiKey: "",
        githubToken: document.getElementById("githubToken").value.trim(),
        context7ApiKey: "",
        browserHeadless: true,
        requireApprovalFor: [
          "run_command", "write_file", "replace_content",
          "browser_control", "create_tool",
        ],
        maxContextTokens: 120000,
        memoryDir: "./memory",
        skillsDir: "./skills",
      };

      if (!config.provider.apiKey) {
        alert("Please enter your API key.");
        return;
      }

      await window.quiver.saveConfig(config);
      await window.quiver.loadMain();
    }

    // Enter to submit
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        saveAndStart();
      }
    });
  </script>
</body>
</html>
