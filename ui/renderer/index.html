<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <title>Quiver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <img src="assets/logo.png" class="sidebar-logo" alt="Quiver">
      </div>

      <button class="new-chat" onclick="startNewChat()">
        <span>+</span> New Chat
      </button>

      <div class="sessions" id="sessionsList"></div>

      <button class="settings-btn" onclick="window.quiver.loadSettings()">
        <img src="assets/icon-settings.png" class="btn-icon" alt=""> Settings
      </button>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <span class="session-title" id="activeSessionTitle">New Chat</span>
        <div class="header-right">
          <button class="header-btn" id="contextBtn" onclick="toggleContext()" title="Context — see and control what the AI sees">
            <img src="assets/icon-database.png" class="btn-icon" alt=""> Context
          </button>
          <span class="status-dot idle" id="statusDot"></span>
        </div>
      </header>

      <!-- Context transparency sidebar (slide-out) -->
      <aside class="context-sidebar" id="contextSidebar" style="display:none;">
        <div class="context-header">
          <span>Context</span>
          <button class="context-close" onclick="toggleContext()">×</button>
        </div>

        <div class="context-body" id="contextBody">
          <!-- Model -->
          <div class="ctx-group">
            <div class="ctx-group-label">Model</div>
            <div class="ctx-group-value" id="ctxModel">—</div>
          </div>

          <!-- Core Memory (editable) -->
          <div class="ctx-group">
            <div class="ctx-group-label">Core Memory</div>
            <div class="ctx-memory-fields">
              <div class="ctx-mem-field">
                <span class="ctx-mem-key">Identity</span>
                <textarea class="ctx-mem-input" id="ctxIdentity" rows="2" onchange="saveCoreMemory()"></textarea>
              </div>
              <div class="ctx-mem-field">
                <span class="ctx-mem-key">Human Context</span>
                <textarea class="ctx-mem-input" id="ctxHuman" rows="2" onchange="saveCoreMemory()"></textarea>
              </div>
              <div class="ctx-mem-field">
                <span class="ctx-mem-key">Project Context</span>
                <textarea class="ctx-mem-input" id="ctxProject" rows="2" onchange="saveCoreMemory()"></textarea>
              </div>
            </div>
          </div>
          <!-- Persistent Memory Files -->
          <div class="ctx-group">
            <div class="ctx-group-label">Memory Files</div>
            <div class="ctx-mem-list" id="ctxMemList">
              <div class="ctx-loading">Loading…</div>
            </div>
            <button class="ctx-add-btn" onclick="openMemoryEditor('')">+ New memory file</button>
          </div>

          <!-- Skills -->
          <div class="ctx-group">
            <div class="ctx-group-label">Skills</div>
            <div class="ctx-skills-list" id="ctxSkillsList">
              <div class="ctx-loading">Loading…</div>
            </div>
          </div>

          <!-- Stats -->
          <div class="ctx-group">
            <div class="ctx-group-label">Stats</div>
            <div class="ctx-stats">
              <div class="ctx-stat"><span class="ctx-stat-label">Tools</span><span class="ctx-stat-val" id="ctxTools">—</span></div>
              <div class="ctx-stat"><span class="ctx-stat-label">Tokens</span><span class="ctx-stat-val" id="ctxTokens">—</span></div>
            </div>
            <div class="ctx-token-bar-wrap" id="ctxTokenBarWrap" style="display:none;">
              <div class="ctx-token-bar" id="ctxTokenBar"></div>
              <span class="ctx-token-bar-label" id="ctxTokenBarLabel"></span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Memory file editor modal -->
      <div class="modal-overlay" id="memEditorOverlay" style="display:none;" onclick="closeMemoryEditor(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-header">
            <span id="memEditorTitle">Edit Memory File</span>
            <button class="context-close" onclick="closeMemoryEditor()">×</button>
          </div>
          <div class="modal-body">
            <input id="memEditorName" class="modal-input" placeholder="filename.md">
            <textarea id="memEditorContent" class="modal-textarea" placeholder="Memory content…"></textarea>
          </div>
          <div class="modal-footer">
            <button class="btn-primary" onclick="saveMemoryFile()">Save</button>
            <button class="btn-secondary" onclick="closeMemoryEditor()">Cancel</button>
            <button class="btn-danger" id="memDeleteBtn" onclick="deleteMemoryFile()" style="display:none;">Delete</button>
          </div>
        </div>
      </div>

      <!-- Skill viewer modal -->
      <div class="modal-overlay" id="skillViewerOverlay" style="display:none;" onclick="closeSkillViewer(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-header">
            <span id="skillViewerTitle">Skill</span>
            <button class="context-close" onclick="closeSkillViewer()">×</button>
          </div>
          <div class="modal-body">
            <textarea id="skillViewerContent" class="modal-textarea" placeholder="Skill content…"></textarea>
          </div>
          <div class="modal-footer">
            <button class="btn-primary" onclick="saveSkillFile()">Save</button>
            <button class="btn-secondary" onclick="closeSkillViewer()">Close</button>
          </div>
        </div>
      </div>

      <!-- Chat -->
      <div class="chat" id="chatArea">
        <div class="empty" id="emptyState">
          <img src="assets/logo.png" class="empty-logo" alt="Quiver">
          <p class="empty-subtitle">Ask me to code, research, or analyze.</p>
        </div>
      </div>

      <!-- Input -->
      <div class="input-bar" id="inputBar" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
        <textarea id="promptInput" placeholder="Ask Quiver…" rows="1"></textarea>
        <button id="sendBtn" onclick="sendPrompt()">Send</button>
        <button id="stopBtn" onclick="stopAgent()" style="display:none;">Stop</button>
        <div id="dropOverlay" class="drop-overlay" style="display:none;">
          <span>Drop images to attach</span>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
