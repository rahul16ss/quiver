<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">Quiver<span></span></div>
      <nav>
        <button onclick="toggleMemory()">Memory</button>
        <button onclick="window.quiver.loadSettings()">Settings</button>
      </nav>
      <div class="status">
        <span class="dot idle" id="statusDot"></span>
        <span id="statusText">Idle</span>
      </div>
    </header>

    <!-- Memory sidebar (toggle) -->
    <aside class="memory-panel" id="memoryPanel" style="display:none;">
      <div class="memory-header">
        <span>Memory Files</span>
        <button onclick="toggleMemory()">×</button>
      </div>
      <div class="memory-list" id="memoryList"></div>
    </aside>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">⚡</div>
        <div>Send a prompt to start working with Quiver.</div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="promptInput" placeholder="Ask Quiver to code, research, or analyze..." rows="1"></textarea>
        <button id="sendBtn" onclick="sendPrompt()">Send</button>
        <button id="stopBtn" onclick="stopAgent()" style="display:none; background:var(--danger);">Stop</button>
      </div>
      <div class="stats-bar" id="statsBar"></div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById("chatArea");
    const promptInput = document.getElementById("promptInput");
    const sendBtn = document.getElementById("sendBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const statsBar = document.getElementById("statsBar");
    const emptyState = document.getElementById("emptyState");
    let agentRunning = false;
    let currentAgentMsg = null;

    // Auto-resize textarea
    promptInput.addEventListener("input", () => {
      promptInput.style.height = "auto";
      promptInput.style.height = Math.min(promptInput.scrollHeight, 200) + "px";
    });

    // Enter to send, Shift+Enter for newline
    promptInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendPrompt();
      }
    });

    async function sendPrompt() {
      const text = promptInput.value.trim();
      if (!text || agentRunning) return;

      if (emptyState) emptyState.style.display = "none";

      addMessage("user", text);
      promptInput.value = "";
      promptInput.style.height = "auto";

      agentRunning = true;
      sendBtn.disabled = true;
      sendBtn.style.display = "none";
      stopBtn.style.display = "inline-block";
      statusDot.className = "dot live";
      statusText.textContent = "Working...";

      const config = await window.quiver.loadConfig();
      await window.quiver.startAgent(config);
      await window.quiver.sendToAgent(text);

      currentAgentMsg = addMessage("agent", "");
    }

    function addMessage(role, content) {
      const div = document.createElement("div");
      div.className = `msg msg-${role}`;
      div.innerHTML = `<div class="role">${role}</div><div class="body"></div>`;
      const body = div.querySelector(".body");
      if (content) body.textContent = content;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    function addToolCall(toolName, toolArgs) {
      const div = document.createElement("div");
      div.className = "tool-call";
      const argsStr = Object.entries(toolArgs || {})
        .map(([k, v]) => `${k}: ${truncate(String(v), 60)}`)
        .join(", ");
      div.innerHTML = `
        <div class="tool-header">
          <span class="tool-name">▸ ${toolName}</span>
          <span class="tool-args">${argsStr}</span>
        </div>
        <div class="tool-result" style="display:none;"></div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    function showToolResult(toolDiv, result) {
      const resultEl = toolDiv.querySelector(".tool-result");
      resultEl.textContent = truncate(result, 500);
      resultEl.style.display = "block";
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendToken(text) {
      if (!currentAgentMsg) {
        currentAgentMsg = addMessage("agent", "");
      }
      const body = currentAgentMsg.querySelector(".body");
      // Accumulate raw markdown, re-render on each token
      // Store raw text on the element for re-rendering
      body._rawText = (body._rawText || "") + text;
      body.innerHTML = renderMarkdown(body._rawText);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Lightweight markdown renderer — no dependencies
    function renderMarkdown(text) {
      if (!text) return "";
      let html = escapeHtml(text);

      // Code blocks (```lang\ncode```)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });

      // Inline code
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");

      // Bold
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

      // Italic
      html = html.replace(/(?<!\*)\*([^*]+)\*(?!\*)/g, "<em>$1</em>");

      // Links [text](url)
      html = html.replace(
        /\[([^\]]+)\]\(([^)]+)\)/g,
        '<a href="$2" target="_blank" rel="noreferrer">$1</a>',
      );

      // Headers
      html = html.replace(/^### (.+)$/gm, '<div class="md-h3">$1</div>');
      html = html.replace(/^## (.+)$/gm, '<div class="md-h2">$1</div>');
      html = html.replace(/^# (.+)$/gm, '<div class="md-h1">$1</div>');

      // Line breaks
      html = html.replace(/\n/g, "<br>");

      // Clean up extra <br> around block elements
      html = html.replace(/<br>(<pre>)/g, "$1");
      html = html.replace(/(<\/pre>)<br>/g, "$1");
      html = html.replace(/<br>(<div class="md-h)/g, "$1");
      html = html.replace(/(<\/div>)<br>/g, "$1");

      return html;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function truncate(str, max) {
      if (str.length <= max) return str;
      return str.substring(0, max) + "...";
    }

    function setIdle() {
      agentRunning = false;
      sendBtn.disabled = false;
      sendBtn.style.display = "inline-block";
      stopBtn.style.display = "none";
      statusDot.className = "dot idle";
      statusText.textContent = "Idle";
      currentAgentMsg = null;
    }

    function setError(msg) {
      addMessage("error", msg || "Unknown error");
      agentRunning = false;
      sendBtn.disabled = false;
      sendBtn.style.display = "inline-block";
      stopBtn.style.display = "none";
      statusDot.className = "dot error";
      statusText.textContent = "Error";
      currentAgentMsg = null;
    }

    async function stopAgent() {
      await window.quiver.stopAgent();
      setIdle();
    }

    function addApproval(toolName, toolArgs) {
      const div = document.createElement("div");
      div.className = "approval";
      const argsStr = Object.entries(toolArgs || {})
        .map(([k, v]) => `${k}: ${truncate(String(v), 80)}`)
        .join("\n    ");
      div.innerHTML = `
        <div class="approval-title">⚠ Permission required</div>
        <div class="approval-desc">
          <strong>${toolName}</strong>
          <pre>${argsStr}</pre>
        </div>
        <div class="approval-actions">
          <button class="btn-yes" onclick="approveAction(true, this)">Allow</button>
          <button class="btn-no" onclick="approveAction(false, this)">Deny</button>
        </div>
      `;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    async function approveAction(approve, btn) {
      const approvalDiv = btn.closest(".approval");
      if (approvalDiv) {
        approvalDiv.style.opacity = "0.5";
        approvalDiv.style.pointerEvents = "none";
        const result = approve ? "✓ Approved" : "✗ Denied";
        approvalDiv.querySelector(".approval-actions").innerHTML =
          `<span style="color: ${approve ? "var(--success)" : "var(--danger)"}; font-size: 12px;">${result}</span>`;
      }
      await window.quiver.approveToolCall(approve);
    }

    // Track tool call divs by a simple counter (tool calls arrive sequentially)
    let pendingToolDivs = [];

    // Agent events — new event-based protocol
    window.quiver.onAgentEvent((msg) => {
      if (!msg.type) {
        // Legacy format (status-based) — ignore
        return;
      }

      switch (msg.type) {
        case "token":
          appendToken(msg.data?.text || "");
          break;

        case "tool_call":
          const toolDiv = addToolCall(
            msg.data?.toolName || "unknown",
            msg.data?.toolArgs || {},
          );
          pendingToolDivs.push(toolDiv);
          break;

        case "tool_result":
          if (pendingToolDivs.length > 0) {
            const div = pendingToolDivs.shift();
            showToolResult(div, msg.data?.toolResult || "");
          }
          break;

        case "approval":
          addApproval(msg.data?.toolName || "unknown", msg.data?.toolArgs || {});
          break;

        case "done":
          if (msg.data?.tokenStats) {
            const ts = msg.data.tokenStats;
            statsBar.innerHTML = [
              `Turns: ${ts.turns || 0}`,
              `Input: ${ts.inputTokens || 0}`,
              `Output: ${ts.outputTokens || 0}`,
              `Tools: ${ts.toolCalls || 0}`,
            ].join(" · ");
          }
          // If no tokens were streamed but there's a response, show it
          if (currentAgentMsg) {
            const body = currentAgentMsg.querySelector(".body");
            if (!body._rawText && msg.data?.response) {
              body._rawText = msg.data.response;
              body.innerHTML = renderMarkdown(msg.data.response);
            }
          }
          setIdle();
          break;

        case "error":
          setError(msg.data?.error || "Unknown error");
          break;
      }
    });

    // Raw output (non-JSON lines) — append to current agent message
    window.quiver.onAgentRaw((line) => {
      try {
        // Try to parse as JSON (might be an event)
        const parsed = JSON.parse(line);
        if (parsed.type) {
          // Already handled by onAgentEvent — skip
          return;
        }
      } catch {
        // Not JSON — it's raw text output
      }
      appendToken(line);
    });

    window.quiver.onAgentStderr((data) => {
      if (data.includes("[ERROR]") || data.includes('"type":"error"')) {
        statusDot.className = "dot error";
        statusText.textContent = "Error";
      }
    });

    window.quiver.onAgentExit((info) => {
      setIdle();
      statusText.textContent = info.code === 0 ? "Idle" : "Exited";
    });

    window.quiver.onAgentError((err) => {
      setError(err.message || "Agent error");
    });

    promptInput.focus();

    // Memory panel
    let memoryVisible = false;
    async function toggleMemory() {
      memoryVisible = !memoryVisible;
      const panel = document.getElementById("memoryPanel");
      panel.style.display = memoryVisible ? "flex" : "none";
      if (memoryVisible) {
        await loadMemoryFiles();
      }
    }

    async function loadMemoryFiles() {
      const files = await window.quiver.listMemory();
      const list = document.getElementById("memoryList");
      if (!files || files.length === 0) {
        list.innerHTML = '<div class="memory-empty">No memory files yet.</div>';
        return;
      }
      list.innerHTML = "";
      for (const file of files) {
        const item = document.createElement("div");
        item.className = "memory-item";
        item.innerHTML = `
          <div class="memory-item-name">${file.name}</div>
          <div class="memory-item-size">${file.size} bytes</div>
          <pre class="memory-item-content">${escapeHtml(file.content).substring(0, 500)}</pre>
        `;
        list.appendChild(item);
      }
    }

    window.toggleMemory = toggleMemory;
  </script>
</body>
</html>
